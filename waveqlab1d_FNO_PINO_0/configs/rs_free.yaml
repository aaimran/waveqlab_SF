# rs_free.yaml — Plan B: RS (rate-and-state) friction + free outer BC

plan: B
model_key: rs_free
fric_law: RS
bc_mode: free

model:
  type: SeparateFNO2d
  c_in: 18          # 6 spatial + 10 RS scalars + 2 coords
  modes_x: 20
  modes_t: 28
  width: 96          # wider: RS dynamics more complex than SW
  n_layers: 5
  c_out: 4

data:
  sim_nx: 301
  sim_tend: 15.0     # RS needs longer run (slower nucleation)
  nx_lr: 128
  nt_lr: 128
  nx_hr: 256
  nt_hr: 256

training:
  epochs: 100
  batch_size: 12
  lr: 5.0e-4         # lower LR: more complex loss landscape for RS
  weight_decay: 1.0e-5
  lr_scheduler: cosine
  warmup_epochs: 10
  save_every: 10
  multiscale: true
  multiscale_hr_frac: 0.3

loss:
  w_data: 1.0
  w_pde: 0.05
  w_fault: 0.08      # RS fault BC harder to compute exactly
  w_outer: 0.15
  w_ic: 0.05

paths:
  data_dir: data/rs_free
  checkpoint_dir: checkpoints/rs_free
  normalizer_file: checkpoints/rs_free/normalizers.pkl
